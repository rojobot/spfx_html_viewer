name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project alignment
        run: npm run verify-versions

      - name: Build bundle
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Package solution
        run: npm run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-html-viewer-sppkg
          path: sharepoint/solution/*.sppkg
          if-no-files-found: error
